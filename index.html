<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Tangga Ukuran - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f0f7f4; font-family: 'Segoe UI', sans-serif; }
        .anak-tangga { 
            width: 100%; height: 45px; background: #34495e; color: white; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; border-radius: 8px; margin-bottom: 8px; 
            cursor: pointer; transition: all 0.3s; position: relative; font-size: 13px;
        }
        .anak-tangga:hover { background: #2c3e50; transform: translateX(10px); }
        .anak-tangga.active { background: #27ae60; border: 3px solid #f1c40f; }
        
        #kodok { 
            font-size: 30px; position: absolute; left: -45px; 
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10;
        }
        .correct { background-color: #2ecc71 !important; animation: pulse 0.5s; }
        .wrong { background-color: #e74c3c !important; animation: shake 0.5s; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        
        .tab-btn { transition: all 0.3s; border-bottom: 4px solid transparent; }
        .tab-btn.active { border-bottom-color: #f1c40f; background: #4f46e5; color: white; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="max-w-4xl mx-auto bg-white p-4 rounded-3xl shadow-xl border-b-4 border-indigo-600 mb-4">
        <div class="flex flex-wrap justify-between items-center gap-2">
            <div>
                <h1 class="text-xl font-black text-indigo-900 uppercase">🐸 SUPER TANGGA</h1>
                <p class="text-[10px] font-bold text-slate-400">SDN 169 - MULTI SATUAN</p>
            </div>
            <div class="flex gap-4">
                <div class="text-center bg-emerald-50 px-4 py-1 rounded-full border border-emerald-200">
                    <p class="text-[9px] font-bold text-emerald-600 uppercase">Skor</p>
                    <p id="skor" class="text-lg font-black text-emerald-700">0</p>
                </div>
                <div class="text-center bg-indigo-50 px-4 py-1 rounded-full border border-indigo-200">
                    <p class="text-[9px] font-bold text-indigo-600 uppercase">Soal</p>
                    <p id="no-soal" class="text-lg font-black text-indigo-700">1/10</p>
                </div>
            </div>
        </div>

        <div class="flex grid grid-cols-4 gap-2 mt-4">
            <button onclick="setMode('panjang')" id="btn-panjang" class="tab-btn active p-2 rounded-xl text-[10px] font-black uppercase bg-slate-100">📏 Panjang</button>
            <button onclick="setMode('berat')" id="btn-berat" class="tab-btn p-2 rounded-xl text-[10px] font-black uppercase bg-slate-100">⚖️ Berat</button>
            <button onclick="setMode('luas')" id="btn-luas" class="tab-btn p-2 rounded-xl text-[10px] font-black uppercase bg-slate-100">🟦 Luas</button>
            <button onclick="setMode('volume')" id="btn-volume" class="tab-btn p-2 rounded-xl text-[10px] font-black uppercase bg-slate-100">📦 Volume</button>
        </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 max-w-6xl mx-auto">
        <div class="bg-white p-5 rounded-3xl shadow-lg border border-slate-100">
            <h2 class="font-black text-indigo-900 text-sm mb-3 flex items-center gap-2">💡 PETUNJUK</h2>
            <div id="box-petunjuk" class="space-y-3 text-xs font-medium text-slate-600 leading-relaxed">
                </div>
            <div class="mt-6 p-3 bg-yellow-50 rounded-xl border border-yellow-200">
                <p class="text-[10px] text-yellow-700 font-bold uppercase italic">Cara Main:</p>
                <p class="text-[10px] text-yellow-800">1. Lihat soal di kotak biru.<br>2. Klik tangga tujuan kodok.<br>3. Pilih jawaban yang benar.</p>
            </div>
        </div>

        <div class="bg-white p-6 rounded-3xl shadow-lg border border-slate-100 relative">
            <div id="tangga-wrapper" class="relative max-w-[200px] mx-auto">
                <div id="kodok">🐸</div>
                <div id="list-tangga"></div>
            </div>
        </div>

        <div class="bg-indigo-900 p-6 rounded-3xl shadow-2xl text-white border-b-8 border-indigo-950 flex flex-col justify-center min-h-[300px]">
            <div id="game-over-area" class="hidden text-center">
                <h1 class="text-3xl font-black text-yellow-400">HEBAT!</h1>
                <p class="text-sm mt-2">Kamu sudah menyelesaikan tantangan.</p>
                <button onclick="mulaiGame()" class="mt-6 bg-emerald-500 py-3 px-8 rounded-2xl font-bold uppercase text-xs">Main Lagi</button>
            </div>

            <div id="question-area">
                <h3 id="teks-soal" class="text-2xl font-black text-yellow-300 italic mb-6">Mencari soal...</h3>
                <div id="opsi-jawaban" class="grid grid-cols-1 gap-3"></div>
                <p id="msg" class="text-center text-[10px] mt-6 text-indigo-300 font-bold uppercase tracking-widest animate-bounce">Ayo Lompat ke Tangga Tujuan!</p>
            </div>
        </div>
    </div>

    <script>
        const config = {
            panjang: { units: ['km','hm','dam','m','dm','cm','mm'], power: 10, color: 'indigo' },
            berat: { units: ['kg','hg','dag','g','dg','cg','mg'], power: 10, color: 'emerald' },
            luas: { units: ['km²','hm²','dam²','m²','dm²','cm²','mm²'], power: 100, color: 'orange' },
            volume: { units: ['km³','hm³','dam³','m³','dm³','cm³','mm³'], power: 1000, color: 'blue' }
        };

        let currentMode = 'panjang';
        let currentSkor = 0;
        let currentNoSoal = 1;
        let soalAktif = {};
        let stepReady = false;

        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-${mode}`).classList.add('active');
            updateUI();
            mulaiGame();
        }

        function updateUI() {
            const list = document.getElementById('list-tangga');
            const petunjuk = document.getElementById('box-petunjuk');
            list.innerHTML = "";
            const modeInfo = config[currentMode];

            // Render Tangga
            modeInfo.units.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'anak-tangga';
                div.style.marginLeft = (i * 15) + "px";
                div.innerHTML = u.toUpperCase();
                div.onclick = () => handleTanggaClick(u);
                div.setAttribute('data-unit', u);
                list.appendChild(div);
            });

            // Update Teks Petunjuk
            petunjuk.innerHTML = `
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border-l-4 border-indigo-500">
                    <span class="text-lg">⬇️</span> <span>Setiap turun 1 tangga, nilai <b>dikali ${modeInfo.power}</b></span>
                </div>
                <div class="flex items-center gap-2 bg-slate-50 p-2 rounded-lg border-l-4 border-red-500">
                    <span class="text-lg">⬆️</span> <span>Setiap naik 1 tangga, nilai <b>dibagi ${modeInfo.power}</b></span>
                </div>
            `;
        }

        function mulaiGame() {
            currentSkor = 0; currentNoSoal = 1;
            document.getElementById('skor').innerText = "0";
            document.getElementById('game-over-area').classList.add('hidden');
            document.getElementById('question-area').classList.remove('hidden');
            buatSoal();
        }

        function buatSoal() {
            stepReady = false;
            document.getElementById('no-soal').innerText = `${currentNoSoal}/10`;
            document.getElementById('msg').innerText = "Ayo Lompat ke Tangga Tujuan!";
            document.getElementById('opsi-jawaban').innerHTML = "";
            
            const units = config[currentMode].units;
            const idxAwal = Math.floor(Math.random() * units.length);
            let idxTujuan = Math.floor(Math.random() * units.length);
            while(idxTujuan === idxAwal) idxTujuan = Math.floor(Math.random() * units.length);

            const uAwal = units[idxAwal];
            const uTujuan = units[idxTujuan];
            const nAwal = [1, 2, 5, 10, 20][Math.floor(Math.random() * 5)];

            // Hitung Jawaban
            const loncat = idxTujuan - idxAwal;
            const jawaban = nAwal * Math.pow(config[currentMode].power, loncat);

            soalAktif = { uAwal, uTujuan, nAwal, jawaban, idxTujuan };
            document.getElementById('teks-soal').innerHTML = `${nAwal} <span class="text-white">${uAwal.toUpperCase()}</span> = ... ${uTujuan.toUpperCase()}?`;
            
            moveKodok(uAwal);
            document.querySelectorAll('.anak-tangga').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-unit="${uAwal}"]`).classList.add('active');
        }

        function handleTanggaClick(u) {
            moveKodok(u);
            if (u === soalAktif.uTujuan) {
                stepReady = true;
                document.getElementById('msg').innerText = "Bagus! Sekarang pilih nilainya:";
                tampilkanOpsi();
            } else {
                document.getElementById('msg').innerText = "Lompat ke tangga " + soalAktif.uTujuan.toUpperCase() + "!";
                document.getElementById('opsi-jawaban').innerHTML = "";
            }
        }

        function moveKodok(u) {
            const t = document.querySelector(`[data-unit="${u}"]`);
            const k = document.getElementById('kodok');
            k.style.top = (t.offsetTop - 5) + "px";
            k.style.left = (t.offsetLeft - 45) + "px";
        }

        function tampilkanOpsi() {
            const area = document.getElementById('opsi-jawaban');
            area.innerHTML = "";
            const benar = soalAktif.jawaban;
            let pil = [benar];
            
            while(pil.length < 3) {
                const salah = benar * [0.1, 10, 100, 0.01][Math.floor(Math.random()*4)];
                if(!pil.includes(salah) && salah > 0) pil.push(salah);
            }
            pil.sort(() => Math.random() - 0.5);

            pil.forEach(p => {
                const b = document.createElement('button');
                b.className = "bg-white text-indigo-900 font-black py-3 rounded-xl hover:bg-yellow-400 transition-all text-lg";
                b.innerText = p.toLocaleString('id-ID');
                b.onclick = () => {
                    if(p === benar) {
                        currentSkor += 10;
                        b.classList.add('correct');
                        setTimeout(() => { currentNoSoal++; (currentNoSoal > 10) ? tamat() : buatSoal(); }, 600);
                    } else {
                        currentSkor = Math.max(0, currentSkor - 5);
                        b.classList.add('wrong');
                    }
                    document.getElementById('skor').innerText = currentSkor;
                };
                area.appendChild(b);
            });
        }

        function tamat() {
            document.getElementById('question-area').classList.add('hidden');
            document.getElementById('game-over-area').classList.remove('hidden');
        }

        updateUI();
        mulaiGame();
    </script>
</body>
</html>
