<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Pro Audio - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #f0f9ff; min-height: 100vh; overflow-x: hidden; }
        
        /* Tangga 3D */
        .step-container { perspective: 1000px; margin-top: 50px; }
        .step { 
            width: 160px; height: 45px; background: #334155; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; border-radius: 6px; position: relative;
            transform: rotateX(25deg) rotateY(-15deg);
            box-shadow: -12px 12px 0 #1e293b;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            cursor: pointer; margin-bottom: 8px;
        }
        .step:hover { transform: rotateX(25deg) rotateY(-15deg) translate(8px, -8px); background: #6366f1; }
        .step.active { background: #22c55e; box-shadow: -12px 12px 0 #166534; border: 2px solid #fef08a; }

        #kodok { 
            font-size: 45px; position: absolute; z-index: 100;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.2));
            pointer-events: none;
        }

        /* Animasi Berhasil (Confetti Sederhana) */
        .particle { position: fixed; width: 10px; height: 10px; pointer-events: none; z-index: 200; }
        @keyframes fall { to { transform: translateY(100vh) rotate(360deg); opacity: 0; } }

        /* Animasi Gagal (Layar Getar) */
        .shake { animation: shakeAnim 0.3s ease-in-out; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }
    </style>
</head>
<body class="p-4" id="game-body">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl p-5 mb-6 border-b-4 border-indigo-500 flex justify-between items-center">
            <div>
                <h1 class="text-2xl font-black text-indigo-900">TANGGA SAKTI 🐸</h1>
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">SDN 169 - Belajar Seru</p>
            </div>
            <div class="flex gap-4">
                <div class="text-center">
                    <p class="text-[9px] font-black text-slate-400">SKOR</p>
                    <p id="skor" class="text-2xl font-black text-emerald-600">0</p>
                </div>
                <button onclick="switchTab('custom')" id="mode-label" class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded-xl text-xs font-black hover:bg-indigo-200 transition">⚙️ MODE LATIHAN</button>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            <div class="lg:col-span-8 bg-white rounded-[2.5rem] shadow-inner p-12 relative min-h-[600px] border-4 border-white overflow-hidden">
                <div class="step-container" id="step-list">
                    <div id="kodok">🐸</div>
                </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="bg-indigo-900 p-8 rounded-[2.5rem] shadow-2xl text-white min-h-[350px] flex flex-col justify-center border-b-8 border-indigo-950">
                    <div id="question-area">
                        <p class="text-indigo-300 text-[10px] font-black uppercase mb-2">Pertanyaan:</p>
                        <h2 id="teks-soal" class="text-3xl font-black italic text-yellow-300">Memuat...</h2>
                        <div id="opsi-jawaban" class="grid grid-cols-1 gap-3 mt-8"></div>
                        <p id="hint" class="text-center text-[10px] mt-8 text-indigo-400 font-bold animate-pulse uppercase">Klik Tangga Tujuan!</p>
                    </div>
                    
                    <div id="custom-form" class="hidden space-y-4">
                        <h3 class="font-black text-yellow-400">🛠️ BUAT SOAL SENDIRI</h3>
                        <input type="number" id="c-val" placeholder="Angka" class="w-full p-3 rounded-xl text-indigo-900 font-bold">
                        <div class="grid grid-cols-2 gap-2">
                            <select id="c-from" class="p-3 rounded-xl text-indigo-900 font-bold text-xs"></select>
                            <select id="c-to" class="p-3 rounded-xl text-indigo-900 font-bold text-xs"></select>
                        </div>
                        <button onclick="generateCustom()" class="w-full bg-emerald-500 p-3 rounded-xl font-black uppercase text-sm">Uji Sekarang!</button>
                        <button onclick="switchTab('play')" class="w-full text-xs font-bold text-indigo-300">Kembali ke Game</button>
                    </div>
                </div>

                <div class="bg-white p-4 rounded-3xl shadow-lg grid grid-cols-2 gap-2">
                    <button onclick="setMode('panjang')" class="p-3 rounded-xl bg-slate-100 font-bold text-[10px] uppercase hover:bg-indigo-500 hover:text-white transition">📏 Panjang</button>
                    <button onclick="setMode('berat')" class="p-3 rounded-xl bg-slate-100 font-bold text-[10px] uppercase hover:bg-emerald-500 hover:text-white transition">⚖️ Berat</button>
                    <button onclick="setMode('luas')" class="p-3 rounded-xl bg-slate-100 font-bold text-[10px] uppercase hover:bg-orange-500 hover:text-white transition">🟦 Luas</button>
                    <button onclick="setMode('volume')" class="p-3 rounded-xl bg-slate-100 font-bold text-[10px] uppercase hover:bg-blue-500 hover:text-white transition">📦 Volume</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // --- LOGIKA SUARA (WEB AUDIO API) ---
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playSound(type) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            if (type === 'jump') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(600, audioCtx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                osc.start(); osc.stop(audioCtx.currentTime + 0.1);
            } else if (type === 'correct') {
                osc.type = 'triangle';
                [523.25, 659.25, 783.99].forEach((f, i) => {
                    const o = audioCtx.createOscillator();
                    o.connect(gain);
                    o.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.1));
                    o.start(audioCtx.currentTime + (i * 0.1));
                    o.stop(audioCtx.currentTime + (i * 0.1) + 0.1);
                });
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc.start(); osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        // --- LOGIKA GAME ---
        const config = {
            panjang: { units: ['km','hm','dam','m','dm','cm','mm'], power: 10 },
            berat: { units: ['kg','hg','dag','g','dg','cg','mg'], power: 10 },
            luas: { units: ['km²','hm²','dam²','m²','dm²','cm²','mm²'], power: 100 },
            volume: { units: ['km³','hm³','dam³','m³','dm³','cm³','mm³'], power: 1000 }
        };

        let mode = 'panjang';
        let skor = 0;
        let soal = {};

        function setMode(m) {
            mode = m;
            renderTangga();
            updateSelects();
            mulaiNormal();
        }

        function renderTangga() {
            const list = document.getElementById('step-list');
            const kodok = document.getElementById('kodok');
            list.innerHTML = ""; list.appendChild(kodok);

            config[mode].units.forEach((u, i) => {
                const d = document.createElement('div');
                d.className = 'step';
                d.style.marginLeft = (i * 30) + "px";
                d.id = "step-" + u;
                d.innerHTML = u.toUpperCase();
                d.onclick = () => jumpTo(u);
                list.appendChild(d);
            });
        }

        function jumpTo(u) {
            playSound('jump');
            const step = document.getElementById('step-'+u);
            const kodok = document.getElementById('kodok');
            kodok.style.top = (step.offsetTop - 35) + "px";
            kodok.style.left = (step.offsetLeft + 40) + "px";

            if (u === soal.uTujuan) {
                document.getElementById('hint').innerText = "📍 TEPAT! PILIH NILAI DI SAMPING:";
                showOptions();
            } else {
                document.getElementById('hint').innerText = "CARI TANGGA " + soal.uTujuan.toUpperCase() + "!";
                document.getElementById('opsi-jawaban').innerHTML = "";
            }
        }

        function mulaiNormal() {
            const u = config[mode].units;
            const i1 = Math.floor(Math.random() * u.length);
            let i2 = Math.floor(Math.random() * u.length);
            while(i1 === i2) i2 = Math.floor(Math.random() * u.length);
            
            const n = [1, 2, 5, 10, 20][Math.floor(Math.random()*5)];
            setSoal(n, u[i1], u[i2]);
        }

        function setSoal(n, f, t) {
            const u = config[mode].units;
            const ans = n * Math.pow(config[mode].power, u.indexOf(t) - u.indexOf(f));
            soal = { uAwal: f, uTujuan: t, nAwal: n, jawaban: ans };
            
            document.getElementById('teks-soal').innerHTML = `${n} ${f.toUpperCase()} = <br>... ${t.toUpperCase()}?`;
            document.getElementById('opsi-jawaban').innerHTML = "";
            jumpTo(f);
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-'+f).classList.add('active');
        }

        function showOptions() {
            const area = document.getElementById('opsi-jawaban');
            area.innerHTML = "";
            let pils = [soal.jawaban];
            while(pils.length < 3) {
                let s = soal.jawaban * [10, 100, 0.1, 0.01][Math.floor(Math.random()*4)];
                if(!pils.includes(s) && s > 0) pils.push(s);
            }
            pils.sort(() => Math.random() - 0.5);

            pils.forEach(p => {
                const b = document.createElement('button');
                b.className = "bg-white/10 border-2 border-white/20 p-4 rounded-2xl font-black hover:bg-yellow-400 hover:text-indigo-900 transition-all";
                b.innerText = p.toLocaleString('id-ID');
                b.onclick = () => cek(p, b);
                area.appendChild(b);
            });
        }

        function cek(p, b) {
            if (p === soal.jawaban) {
                playSound('correct');
                skor += 10;
                createConfetti();
                b.classList.add('bg-emerald-500');
                setTimeout(mulaiNormal, 1000);
            } else {
                playSound('wrong');
                skor = Math.max(0, skor - 5);
                document.getElementById('game-body').classList.add('shake');
                setTimeout(() => document.getElementById('game-body').classList.remove('shake'), 300);
                b.classList.add('bg-red-500');
            }
            document.getElementById('skor').innerText = skor;
        }

        // --- EFEK VISUAL ---
        function createConfetti() {
            for(let i=0; i<20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-10px';
                p.style.backgroundColor = ['#fbbf24','#34d399','#60a5fa','#f87171'][Math.floor(Math.random()*4)];
                p.style.animation = `fall ${Math.random() * 2 + 1}s linear forwards`;
                document.body.appendChild(p);
                setTimeout(() => p.remove(), 3000);
            }
        }

        // --- MENU CUSTOM ---
        function switchTab(t) {
            document.getElementById('question-area').style.display = (t === 'play') ? 'block' : 'none';
            document.getElementById('custom-form').style.display = (t === 'custom') ? 'block' : 'none';
        }

        function updateSelects() {
            const f = document.getElementById('c-from');
            const t = document.getElementById('c-to');
            f.innerHTML = t.innerHTML = "";
            config[mode].units.forEach(u => {
                f.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`;
                t.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`;
            });
        }

        function generateCustom() {
            const n = document.getElementById('c-val').value;
            const f = document.getElementById('c-from').value;
            const t = document.getElementById('c-to').value;
            if(!n || f === t) return alert("Isi angka dan pilih satuan yang berbeda!");
            switchTab('play');
            setSoal(parseFloat(n), f, t);
        }

        window.onload = () => setMode('panjang');
    </script>
</body>
</html>
