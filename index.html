<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangga Ukuran 3D - SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #e0f2fe 0%, #f0fdf4 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
        
        /* Efek Tangga 3D Realistis */
        .step-container { perspective: 1000px; margin-top: 20px; }
        .step { 
            width: 180px; height: 40px; background: #334155; color: white;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; border-radius: 4px; position: relative;
            transform: rotateX(20deg) rotateY(-10deg);
            box-shadow: -10px 10px 0 #1e293b, -20px 20px 20px rgba(0,0,0,0.2);
            transition: all 0.3s; cursor: pointer; margin-bottom: 5px;
        }
        .step::before { /* Sisi Samping Tangga */
            content: ''; position: absolute; left: -10px; top: 5px;
            width: 10px; height: 100%; background: #1e293b;
            transform: skewY(-45deg);
        }
        .step::after { /* Sisi Atas Tangga */
            content: ''; position: absolute; top: -10px; left: 5px;
            width: 100%; height: 10px; background: #475569;
            transform: skewX(-45deg);
        }
        .step:hover { transform: rotateX(20deg) rotateY(-10deg) translate(5px, -5px); background: #4f46e5; }
        .step.active { background: #22c55e; box-shadow: -10px 10px 0 #166534; }

        #kodok { 
            font-size: 40px; position: absolute; z-index: 50;
            transition: all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            filter: drop-shadow(0 10px 5px rgba(0,0,0,0.3));
        }

        .correct-anim { animation: celebrate 0.5s ease; }
        @keyframes celebrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.3) rotate(15deg); } }
        
        .mode-btn { transition: 0.3s; }
        .mode-btn.active { background: #4f46e5; color: white; border-color: #4338ca; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto">
        <div class="bg-white rounded-3xl shadow-2xl p-6 mb-6 border-b-8 border-indigo-200">
            <div class="flex flex-wrap justify-between items-center">
                <div>
                    <h1 class="text-3xl font-black text-indigo-900 italic">PRO TANGGA 3D 🐸</h1>
                    <p class="text-sm font-bold text-slate-400">Media Pembelajaran Interaktif SDN 169</p>
                </div>
                <div class="flex gap-2 bg-slate-100 p-2 rounded-2xl">
                    <button onclick="switchTab('play')" id="tab-play" class="mode-btn active px-6 py-2 rounded-xl font-bold uppercase text-xs">🎮 Main</button>
                    <button onclick="switchTab('custom')" id="tab-custom" class="mode-btn px-6 py-2 rounded-xl font-bold uppercase text-xs">🛠️ Buat Latihan</button>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
            
            <div class="lg:col-span-3 space-y-4">
                <div class="bg-white p-5 rounded-3xl shadow-lg">
                    <h2 class="font-black text-xs text-slate-400 uppercase mb-4 tracking-widest">Pilih Kategori</h2>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="setMode('panjang')" class="p-3 rounded-xl bg-indigo-50 hover:bg-indigo-100 text-indigo-700 font-bold text-xs transition">📏 Panjang</button>
                        <button onclick="setMode('berat')" class="p-3 rounded-xl bg-emerald-50 hover:bg-emerald-100 text-emerald-700 font-bold text-xs transition">⚖️ Berat</button>
                        <button onclick="setMode('luas')" class="p-3 rounded-xl bg-orange-50 hover:bg-orange-100 text-orange-700 font-bold text-xs transition">🟦 Luas</button>
                        <button onclick="setMode('volume')" class="p-3 rounded-xl bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold text-xs transition">📦 Volume</button>
                    </div>
                </div>

                <div id="custom-menu" class="hidden bg-indigo-900 p-5 rounded-3xl shadow-xl text-white">
                    <h2 class="font-black text-xs text-indigo-300 uppercase mb-4 tracking-widest">🛠️ Rancang Soal</h2>
                    <div class="space-y-3">
                        <div>
                            <label class="text-[10px] font-bold opacity-70">ANGKA:</label>
                            <input type="number" id="custom-val" value="5" class="w-full p-2 rounded-lg text-indigo-900 font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold opacity-70">DARI:</label>
                            <select id="custom-from" class="w-full p-2 rounded-lg text-indigo-900 font-bold uppercase"></select>
                        </div>
                        <div>
                            <label class="text-[10px] font-bold opacity-70">KE:</label>
                            <select id="custom-to" class="w-full p-2 rounded-lg text-indigo-900 font-bold uppercase"></select>
                        </div>
                        <button onclick="generateCustomSoal()" class="w-full bg-yellow-400 hover:bg-yellow-500 text-indigo-900 font-black py-3 rounded-xl text-xs uppercase mt-2 shadow-lg">UJI SEKARANG</button>
                    </div>
                </div>

                <div class="bg-white p-5 rounded-3xl shadow-lg border-l-8 border-yellow-400">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-2">Skor Kamu</p>
                    <p id="skor" class="text-4xl font-black text-indigo-900">0</p>
                </div>
            </div>

            <div class="lg:col-span-5 bg-white rounded-[3rem] shadow-inner p-10 relative overflow-hidden min-h-[500px] border-4 border-white">
                <div class="step-container" id="step-list">
                    <div id="kodok">🐸</div>
                    </div>
            </div>

            <div class="lg:col-span-4 space-y-4">
                <div class="bg-indigo-800 p-8 rounded-[3rem] text-white shadow-2xl relative overflow-hidden min-h-[300px] flex flex-col justify-center border-b-8 border-indigo-950">
                    <div id="question-box">
                        <p class="text-[10px] font-black text-indigo-300 uppercase tracking-widest mb-2">Tantangan:</p>
                        <h2 id="teks-soal" class="text-3xl font-black italic text-yellow-300 leading-tight">Klik tombol Main untuk mulai!</h2>
                        <div id="opsi-jawaban" class="grid grid-cols-1 gap-3 mt-8"></div>
                    </div>
                    <div id="feedback" class="absolute bottom-6 left-0 right-0 text-center font-black text-xs uppercase tracking-widest animate-bounce text-indigo-200"></div>
                </div>
                
                <div class="bg-white p-6 rounded-3xl shadow-lg">
                    <p class="text-[10px] font-black text-slate-400 uppercase mb-3">Rumus Cepat:</p>
                    <div id="rumus" class="text-xs font-bold text-slate-600 space-y-2"></div>
                </div>
            </div>

        </div>
    </div>

    <script>
        const config = {
            panjang: { units: ['km','hm','dam','m','dm','cm','mm'], power: 10 },
            berat: { units: ['kg','hg','dag','g','dg','cg','mg'], power: 10 },
            luas: { units: ['km²','hm²','dam²','m²','dm²','cm²','mm²'], power: 100 },
            volume: { units: ['km³','hm³','dam³','m³','dm³','cm³','mm³'], power: 1000 }
        };

        let mode = 'panjang';
        let skor = 0;
        let soal = {};
        let currentTab = 'play';

        function switchTab(t) {
            currentTab = t;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.getElementById('custom-menu').style.display = (t === 'custom') ? 'block' : 'none';
            if(t === 'play') mulaiNormal();
        }

        function setMode(m) {
            mode = m;
            renderTangga();
            updateSelects();
            updateRumus();
            mulaiNormal();
        }

        function updateRumus() {
            const p = config[mode].power;
            document.getElementById('rumus').innerHTML = `
                <div class="flex justify-between"><span>Turun 1 Tangga</span> <span class="text-emerald-600">x ${p}</span></div>
                <div class="flex justify-between"><span>Naik 1 Tangga</span> <span class="text-red-600">: ${p}</span></div>
            `;
        }

        function updateSelects() {
            const from = document.getElementById('custom-from');
            const to = document.getElementById('custom-to');
            from.innerHTML = to.innerHTML = "";
            config[mode].units.forEach(u => {
                let opt = `<option value="${u}">${u.toUpperCase()}</option>`;
                from.innerHTML += opt; to.innerHTML += opt;
            });
        }

        function renderTangga() {
            const container = document.getElementById('step-list');
            const kodok = document.getElementById('kodok');
            container.innerHTML = "";
            container.appendChild(kodok);

            config[mode].units.forEach((u, i) => {
                const div = document.createElement('div');
                div.className = 'step';
                div.style.marginLeft = (i * 25) + "px";
                div.innerHTML = u.toUpperCase();
                div.id = "step-" + u;
                div.onclick = () => jumpTo(u);
                container.appendChild(div);
            });
        }

        function jumpTo(u) {
            const step = document.getElementById('step-'+u);
            const kodok = document.getElementById('kodok');
            kodok.style.top = (step.offsetTop - 30) + "px";
            kodok.style.left = (step.offsetLeft + 40) + "px";

            if (u === soal.uTujuan) {
                document.getElementById('feedback').innerText = "📍 POSISI TEPAT! PILIH JAWABAN:";
                showOptions();
            } else {
                document.getElementById('feedback').innerText = "CARI TANGGA " + soal.uTujuan.toUpperCase() + "!";
                document.getElementById('opsi-jawaban').innerHTML = "";
            }
        }

        function mulaiNormal() {
            const u = config[mode].units;
            const idx1 = Math.floor(Math.random() * u.length);
            let idx2 = Math.floor(Math.random() * u.length);
            while(idx1 === idx2) idx2 = Math.floor(Math.random() * u.length);
            
            const n = [1, 2, 5, 10, 50][Math.floor(Math.random()*5)];
            setSoal(n, u[idx1], u[idx2]);
        }

        function generateCustomSoal() {
            const n = document.getElementById('custom-val').value;
            const f = document.getElementById('custom-from').value;
            const t = document.getElementById('custom-to').value;
            if(f === t) return alert("Satuan awal dan tujuan tidak boleh sama!");
            setSoal(n, f, t);
        }

        function setSoal(n, f, t) {
            const u = config[mode].units;
            const i1 = u.indexOf(f);
            const i2 = u.indexOf(t);
            const ans = n * Math.pow(config[mode].power, i2 - i1);

            soal = { uAwal: f, uTujuan: t, nAwal: n, jawaban: ans };
            
            document.getElementById('teks-soal').innerHTML = `${n} ${f.toUpperCase()} <br>= <span class="text-white">...</span> ${t.toUpperCase()}?`;
            document.getElementById('opsi-jawaban').innerHTML = "";
            document.getElementById('feedback').innerText = "LOMPAT KE " + t.toUpperCase();
            
            // Kodok mulai di tangga awal
            jumpTo(f);
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('step-'+f).classList.add('active');
        }

        function showOptions() {
            const area = document.getElementById('opsi-jawaban');
            area.innerHTML = "";
            let pils = [soal.jawaban];
            while(pils.length < 3) {
                let s = soal.jawaban * [10, 100, 0.1, 0.01][Math.floor(Math.random()*4)];
                if(!pils.includes(s) && s > 0) pils.push(s);
            }
            pils.sort(() => Math.random() - 0.5);

            pils.forEach(p => {
                const b = document.createElement('button');
                b.className = "bg-white/10 border-2 border-white/20 hover:bg-yellow-400 hover:text-indigo-900 p-4 rounded-2xl font-black transition-all";
                b.innerText = p.toLocaleString('id-ID');
                b.onclick = () => cek(p, b);
                area.appendChild(b);
            });
        }

        function cek(p, b) {
            if(p === soal.jawaban) {
                skor += 10;
                b.classList.add('bg-emerald-500');
                document.getElementById('kodok').classList.add('correct-anim');
                setTimeout(() => {
                    document.getElementById('kodok').classList.remove('correct-anim');
                    if(currentTab === 'play') mulaiNormal();
                    else document.getElementById('feedback').innerText = "HEBAT! SOAL CUSTOM SELESAI.";
                }, 800);
            } else {
                skor = Math.max(0, skor - 5);
                b.classList.add('bg-red-500');
            }
            document.getElementById('skor').innerText = skor;
        }

        // Jalankan awal
        setMode('panjang');
    </script>
</body>
</html>
