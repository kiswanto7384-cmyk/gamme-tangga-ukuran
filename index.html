<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Tangga Pintar SDN 169</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #bae6fd, #e0f2fe); min-height: 100vh; font-family: sans-serif; }
        .step { 
            background: white; border: 3px solid #3b82f6; color: #1e3a8a;
            width: 180px; height: 50px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; border-radius: 12px; margin-bottom: 15px; cursor: pointer;
            box-shadow: 0 8px 0 #1e40af; transform: rotateX(15deg);
        }
        .step:hover { background: #eff6ff; }
        .step.active { background: #fbbf24; border-color: #b45309; }
        #kodok { position: absolute; font-size: 50px; transition: all 0.5s; z-index: 10; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-4xl mx-auto bg-white p-8 rounded-3xl shadow-2xl border-4 border-blue-200">
        <h1 class="text-3xl font-black text-blue-900 text-center mb-6">🐸 TANGGA PINTAR SDN 169</h1>
        
        <div class="flex gap-4 justify-center mb-10">
            <button onclick="setMode('panjang')" class="bg-sky-500 text-white px-6 py-2 rounded-full font-bold">📏 Panjang</button>
            <button onclick="setMode('berat')" class="bg-green-500 text-white px-6 py-2 rounded-full font-bold">⚖️ Berat</button>
        </div>

        <div class="flex gap-10 justify-center">
            <div id="game-area" class="relative">
                <div id="kodok">🐸</div>
                <div id="steps"></div>
            </div>
            <div class="bg-blue-900 p-8 rounded-3xl text-white w-80">
                <h2 id="soal" class="text-2xl font-bold mb-6">Memuat...</h2>
                <div id="pilihan" class="grid grid-cols-1 gap-3"></div>
            </div>
        </div>
    </div>

    <script>
        const config = {
            panjang: { units: ['km','hm','dam','m','dm','cm','mm'], p: 10 },
            berat: { units: ['kg','hg','dag','g','dg','cg','mg'], p: 10 }
        };
        let mode = 'panjang', soal = {};

        function setMode(m) {
            mode = m; renderSteps(); buatSoal();
        }

        function renderSteps() {
            const container = document.getElementById('steps');
            container.innerHTML = "";
            config[mode].units.forEach((u, i) => {
                const d = document.createElement('div');
                d.className = 'step'; d.id = 's-' + u; d.innerText = u.toUpperCase();
                d.onclick = () => jump(u);
                container.appendChild(d);
            });
        }

        function jump(u) {
            const s = document.getElementById('s-'+u);
            const k = document.getElementById('kodok');
            k.style.top = (s.offsetTop + 10) + "px";
            k.style.left = (s.offsetLeft - 60) + "px";
            if(u === soal.t) showOpsi();
        }

        function buatSoal() {
            const u = config[mode].units;
            const i1 = 0, i2 = 2; // Contoh sederhana
            const ans = 100;
            soal = { f: u[i1], t: u[i2], ans };
            document.getElementById('soal').innerText = `1 ${u[i1].toUpperCase()} = ... ${u[i2].toUpperCase()}`;
            jump(u[i1]);
        }

        function showOpsi() {
            const p = document.getElementById('pilihan'); p.innerHTML = "";
            [100, 10, 1000].forEach(n => {
                const b = document.createElement('button');
                b.className = "bg-white text-blue-900 py-3 rounded-xl font-bold hover:bg-yellow-400";
                b.innerText = n;
                b.onclick = () => { if(n === 100) alert("Benar!"); else alert("Coba lagi!"); buatSoal(); };
                p.appendChild(b);
            });
        }

        setMode('panjang');
    </script>
</body>
</html>
