<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tangga Pintar SDN 169 - Final Solution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(to bottom, #7dd3fc, #f0f9ff); min-height: 100vh; font-family: sans-serif; overflow-x: hidden; }
        .grass { position: fixed; bottom: 0; width: 100%; height: 100px; background: #22c55e; border-top: 10px solid #16a34a; z-index: -1; }
        .step { 
            width: 160px; height: 45px; background: white; color: #1e293b;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; border-radius: 10px; position: relative;
            transform: rotateX(20deg) rotateY(-10deg);
            box-shadow: -8px 8px 0 #cbd5e1, 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.3s; cursor: pointer; border: 2px solid #94a3b8;
        }
        .step:hover { transform: scale(1.05) translate(5px, -5px); background: #f8fafc; }
        .step.active { background: #fbbf24; border-color: #d97706; box-shadow: -8px 8px 0 #b45309; }
        #kodok { font-size: 45px; position: absolute; z-index: 50; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .shake { animation: shake 0.3s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
        .score-anim { animation: bounce 0.5s; }
        @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    </style>
</head>
<body class="p-4" id="main-body">
    <div class="grass"></div>
    
    <div class="max-w-6xl mx-auto bg-white/95 backdrop-blur p-6 rounded-3xl shadow-xl border-4 border-white mb-6">
        <div class="flex flex-wrap justify-between items-center gap-4">
            <div>
                <h1 class="text-2xl font-black text-blue-900 uppercase">🐸 Tangga Pintar SDN 169</h1>
                <p id="msg" class="text-xs font-bold text-blue-500 mt-1 bg-blue-50 px-3 py-1 rounded-full inline-block animate-pulse">
                    Memuat Tantangan...
                </p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-blue-900 text-white px-6 py-3 rounded-2xl border-2 border-blue-700 shadow-inner">
                    <p class="text-[10px] font-bold opacity-70 text-center uppercase">Skor</p>
                    <p id="skor" class="text-3xl font-black text-center">0</p>
                </div>
                <button onclick="toggleCustom()" class="bg-orange-500 hover:bg-orange-600 text-white px-5 py-3 rounded-2xl font-black text-xs shadow-lg transition">🛠️ BUAT SOAL</button>
            </div>
        </div>
        
        <div class="flex gap-2 mt-5 overflow-x-auto pb-2">
            <button onclick="setMode('panjang')" class="bg-blue-100 hover:bg-blue-200 px-4 py-2 rounded-xl font-bold text-[10px] transition border-b-4 border-blue-300">📏 PANJANG</button>
            <button onclick="setMode('berat')" class="bg-green-100 hover:bg-green-200 px-4 py-2 rounded-xl font-bold text-[10px] transition border-b-4 border-green-300">⚖️ BERAT</button>
            <button onclick="setMode('luas')" class="bg-orange-100 hover:bg-orange-200 px-4 py-2 rounded-xl font-bold text-[10px] transition border-b-4 border-orange-300">🟦 LUAS</button>
            <button onclick="setMode('volume')" class="bg-purple-100 hover:bg-purple-200 px-4 py-2 rounded-xl font-bold text-[10px] transition border-b-4 border-purple-300">📦 VOLUME</button>
            <button onclick="setMode('liter')" class="bg-cyan-100 hover:bg-cyan-200 px-4 py-2 rounded-xl font-bold text-[10px] transition border-b-4 border-cyan-400 text-cyan-700">💧 LITER & KUBIK</button>
        </div>

        <div id="custom-menu" class="hidden mt-4 p-5 bg-orange-50 border-4 border-orange-200 rounded-[2rem]">
            <h3 class="text-xs font-black text-orange-700 mb-3 uppercase">🛠️ Rancang Latihan Mandiri</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="number" id="c-val" placeholder="Angka" class="p-3 rounded-xl border-2 border-orange-200 font-bold">
                <select id="c-from" class="p-3 rounded-xl border-2 border-orange-200 font-bold uppercase"></select>
                <select id="c-to" class="p-3 rounded-xl border-2 border-orange-200 font-bold uppercase"></select>
                <button onclick="generateCustom()" class="bg-orange-600 text-white font-black rounded-xl py-3 text-xs uppercase shadow-md">Uji Sekarang</button>
            </div>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-6xl mx-auto items-start">
        <div class="relative min-h-[580px] bg-white/30 rounded-[3rem] p-10 border-4 border-white/50" id="area-tangga">
            <div id="kodok">🐸</div>
            <div id="list-tangga" class="mt-5"></div>
        </div>

        <div class="bg-indigo-900 p-8 rounded-[3rem] text-white shadow-2xl flex flex-col justify-center border-b-[12px] border-indigo-950 min-h-[420px]">
            <h2 id="teks-soal" class="text-4xl font-black text-yellow-300 italic mb-10 text-center leading-tight drop-shadow-lg">Memuat...</h2>
            <div id="opsi" class="grid gap-4"></div>
            <div class="mt-10 p-4 rounded-2xl bg-white/10 text-center border border-white/20">
                <p id="petunjuk-tugas" class="text-sm font-black text-indigo-200 uppercase tracking-widest">Lompatlah ke tangga tujuan!</p>
            </div>
        </div>
    </div>

    <script>
        const config = {
            panjang: { units: ['km','hm','dam','m','dm','cm','mm'], p: 10 },
            berat: { units: ['kg','hg','dag','g','dg','cg','mg'], p: 10 },
            luas: { units: ['km²','hm²','dam²','m²','dm²','cm²','mm²'], p: 100 },
            volume: { units: ['km³','hm³','dam³','m³','dm³','cm³','mm³'], p: 1000 },
            liter: { units: ['kl','hl','dal','l','dl','cl','ml'], p: 10 }
        };
        
        const jembatan = { 'l': 'dm³', 'ml': 'cm³', 'kl': 'm³', 'dm³': 'l', 'cm³': 'ml', 'm³': 'kl' };

        let mode = 'panjang', skor = 0, soal = {};
        const audio = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(f, t=0.1) {
            try {
                const o = audio.createOscillator(); const g = audio.createGain();
                o.connect(g); g.connect(audio.destination);
                o.frequency.setValueAtTime(f, audio.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audio.currentTime + t);
                o.start(); o.stop(audio.currentTime + t);
            } catch(e) {}
        }

        function toggleCustom() { document.getElementById('custom-menu').classList.toggle('hidden'); updateSelects(); }

        function updateSelects() {
            const f = document.getElementById('c-from'), t = document.getElementById('c-to');
            f.innerHTML = t.innerHTML = "";
            config[mode].units.forEach(u => {
                f.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`;
                t.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`;
            });
            if(mode === 'liter') ['m³','dm³','cm³'].forEach(u => t.innerHTML += `<option value="${u}">${u.toUpperCase()}</option>`);
        }

        function setMode(m) { mode = m; render(); buatSoal(); updateSelects(); }

        function render() {
            const list = document.getElementById('list-tangga'); list.innerHTML = "";
            config[mode].units.forEach((u, i) => {
                const d = document.createElement('div');
                d.className = 'step'; d.style.marginLeft = (i * 42) + "px";
                d.id = 's-' + u; d.innerText = u.toUpperCase();
                d.onclick = () => jump(u);
                list.appendChild(d);
            });
        }

        function jump(u) {
            playSound(440, 0.05);
            const s = document.getElementById('s-'+u), k = document.getElementById('kodok');
            if(!s) return;
            k.style.top = (s.offsetTop - 40) + "px"; k.style.left = (s.offsetLeft + 45) + "px";
            
            if(u === soal.t_tangga) { 
                document.getElementById('petunjuk-tugas').innerText = "✅ TEPAT! PILIH JAWABAN DI ATAS:"; 
                showOpsi(); 
            } else { 
                document.getElementById('petunjuk-tugas').innerText = "LOMPAT KE TANGGA " + soal.t_tangga.toUpperCase() + "!"; 
                document.getElementById('opsi').innerHTML = ""; 
            }
        }

        function buatSoal() {
            const u = config[mode].units;
            // Batasi jarak maksimal 3 tangga agar angka tidak terlalu kecil/besar
            let i1 = Math.floor(Math.random()*u.length);
            let jarak = Math.floor(Math.random() * 7) - 3; // -3 sampai 3
            let i2 = Math.max(0, Math.min(u.length - 1, i1 + (jarak === 0 ? 1 : jarak)));
            
            let n = [1, 2, 5, 10, 25, 50][Math.floor(Math.random()*6)];
            let f = u[i1], t = u[i2], t_tampilan = t, t_tangga = t;

            if(mode === 'liter' && Math.random() > 0.6) {
                if(jembatan[t]) { t_tampilan = jembatan[t]; t_tangga = t; }
            }
            setSoalAktif(n, f, t_tampilan, t_tangga);
        }

        function setSoalAktif(n, f, t_tampilan, t_tangga) {
            const u = config[mode].units;
            const ans = n * Math.pow(config[mode].p, u.indexOf(t_tangga) - u.indexOf(f));
            soal = { f, t_tampilan, t_tangga, ans };
            document.getElementById('teks-soal').innerHTML = `${n.toLocaleString('id-ID')} ${f.toUpperCase()} = <br>... ${t_tampilan.toUpperCase()}?`;
            document.getElementById('opsi').innerHTML = "";
            jump(f);
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('s-'+f).classList.add('active');
        }

        function updateSkor(poin) {
            skor += poin; if(skor < 0) skor = 0;
            const el = document.getElementById('skor'); el.innerText = skor;
            el.classList.add('score-anim'); setTimeout(()=>el.classList.remove('score-anim'), 500);
        }

        function formatAngka(num) {
            if (num >= 0.000001) return num.toLocaleString('id-ID', { maximumFractionDigits: 10 });
            // Untuk angka sangat kecil, gunakan toFixed agar tidak muncul '0' atau notasi ilmiah 'e'
            let str = num.toFixed(20).replace(/\.?0+$/, "");
            return str;
        }

        function showOpsi() {
            const area = document.getElementById('opsi'); area.innerHTML = "";
            let pils = [soal.ans, soal.ans*10, soal.ans/10].sort(()=>Math.random()-0.5);
            pils.forEach(p => {
                const b = document.createElement('button');
                b.className = "bg-white text-indigo-900 p-5 rounded-2xl font-black text-xl hover:bg-yellow-400 shadow-lg border-b-4 border-slate-300";
                b.innerText = formatAngka(p);
                b.onclick = () => {
                    if(Math.abs(p - soal.ans) < 0.00000000001) { 
                        playSound(880, 0.2); updateSkor(10);
                        b.classList.add('bg-green-500', 'text-white');
                        setTimeout(buatSoal, 800); 
                    } else { 
                        playSound(150, 0.4); updateSkor(-5);
                        b.classList.add('bg-red-500', 'text-white');
                        document.getElementById('main-body').classList.add('shake'); 
                        setTimeout(()=>document.getElementById('main-body').classList.remove('shake'), 300); 
                    }
                };
                area.appendChild(b);
            });
        }

        function generateCustom() {
            const n = document.getElementById('c-val').value;
            const f = document.getElementById('c-from').value;
            const t = document.getElementById('c-to').value;
            if(!n || f === t) return alert("Pilih satuan berbeda!");
            let t_tangga = t;
            for (let key in jembatan) { if (jembatan[key] === t) t_tangga = key; }
            setSoalAktif(parseFloat(n), f, t, t_tangga);
            document.getElementById('custom-menu').classList.add('hidden');
        }

        window.onload = () => setMode('panjang');
    </script>
</body>
</html>
